name: Package CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package
        uses: actions/checkout@v6
        with:
          path: package
      - name: Check out Blacknode
        uses: actions/checkout@v6
        with:
          repository: temiroff/Blacknode
          path: core
      - name: Check out controller dependency
        uses: actions/checkout@v6
        with:
          repository: temiroff/blacknode-controllers
          path: core/packages/blacknode-controllers
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./core pytest
          python -m pip install "numpy>=1.24" "pillow>=10"
      - name: Link package into Blacknode
        run: |
          mkdir -p core/packages
          ln -s "$GITHUB_WORKSPACE/package" core/packages/blacknode-isaac
      - name: Run package tests
        working-directory: package
        env:
          PYTHONPATH: ../core/python
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tests
      - name: Validate official package catalog
        working-directory: core
        env:
          PYTHONPATH: python
        run: python -m blacknode.cli packages validate-catalog ../package
      - name: Validate package templates
        working-directory: core
        env:
          PYTHONPATH: python
        run: |
          find ../package -path '*/templates/*.json' -print0 | while IFS= read -r -d '' template; do
            python -m blacknode.cli validate "$template"
          done
